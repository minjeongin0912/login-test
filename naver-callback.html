<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네이버 로그인 처리 중</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .callback-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 0;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #e0e0e0;
      border-top-color: #03c75a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .callback-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .callback-desc {
      font-size: 14px;
      color: #999;
    }

    .result-icon {
      font-size: 52px;
      line-height: 1;
    }

    .result-icon.success { color: #03c75a; }
    .result-icon.error   { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="callback-container" id="loadingView">
      <div class="spinner"></div>
      <p class="callback-title">네이버 로그인 처리 중...</p>
      <p class="callback-desc">잠시만 기다려 주세요.</p>
    </div>

    <div class="callback-container" id="successView" style="display:none;">
      <p class="result-icon success">✓</p>
      <p class="callback-title">로그인 성공!</p>
      <p class="callback-desc" id="successName"></p>
      <p class="callback-desc">잠시 후 메인 페이지로 이동합니다.</p>
    </div>

    <div class="callback-container" id="errorView" style="display:none;">
      <p class="result-icon error">✕</p>
      <p class="callback-title">로그인 실패</p>
      <p class="callback-desc" id="errorMessage"></p>
      <a href="index.html">
        <button style="margin-top:8px;">다시 시도</button>
      </a>
    </div>
  </div>

  <script src="naver-callback.js"></script>
</body>
</html>
