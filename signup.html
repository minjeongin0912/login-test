<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <h1>회원가입</h1>
    <form id="signupForm">
      <div class="input-group">
        <label for="name">이름 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="이름을 입력하세요" required>
      </div>
      <div class="input-group">
        <label for="email">이메일 <span class="required">*</span></label>
        <input type="email" id="email" placeholder="이메일을 입력하세요" required>
      </div>
      <div class="input-group">
        <label for="password">비밀번호 <span class="required">*</span></label>
        <input type="password" id="password" placeholder="6자 이상 입력하세요" required>
      </div>
      <div class="input-group">
        <label for="passwordConfirm">비밀번호 확인 <span class="required">*</span></label>
        <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" required>
      </div>
      <button type="submit">회원가입</button>
      <p id="message" class="message"></p>
    </form>
    <p class="page-link">이미 계정이 있으신가요? <a href="index.html">로그인</a></p>
  </div>
  <script type="module" src="signup.js"></script>
</body>
</html>
